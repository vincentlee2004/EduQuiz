<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduQuiz - Fun Play!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0D6EFD; --secondary-color: #198754; --accent-color: #FFC107;
            --danger-color: #DC3545; --dark-color: #212529; --light-color: #F8F9FA;
            --white: #ffffff; --shadow: 0 8px 25px rgba(0, 0, 0, 0.15); --border-radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--dark-color);
            overflow-x: hidden;
        }

        /* --- BACKGROUND ANIMATIONS --- */
        #bg-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star, .rocket { position: absolute; color: white; opacity: 0.5; }
        .star { animation: twinkle 3s infinite ease-in-out; }
        .rocket { font-size: 3rem; animation: fly 15s infinite linear; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        @keyframes fly { 
            from { transform: translateY(110vh) translateX(-50px) rotate(-45deg); } 
            to { transform: translateY(-110px) translateX(110vw) rotate(-45deg); } 
        }

        .container {
            width: 95%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            z-index: 10;
            overflow: hidden;
            border: 4px solid var(--white);
        }

        header {
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            color: var(--white);
            padding: 1.5rem;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            animation: wobble 7s ease-in-out infinite;
        }
        @keyframes wobble { 0%, 100% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } }

        main { padding: 2rem; min-height: 500px; }

        /* --- GAME UI --- */
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .score-box { font-size: 2rem; font-weight: 700; color: var(--primary-color); }
        
        .progress-container { width: 100%; height: 20px; background: #eee; border-radius: 50px; margin-bottom: 2rem; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--secondary-color), var(--accent-color)); width: 0%; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .question-box { text-align: center; margin-bottom: 2.5rem; }
        .question-text { font-size: 2.5rem; margin-bottom: 1.5rem; color: #333; }
        .question-img { max-width: 100%; max-height: 300px; border-radius: 15px; border: 5px solid white; box-shadow: var(--shadow); margin-bottom: 15px; }

        .answers-grid { display: grid; gap: 1.5rem; }
        .answer-card {
            background: white;
            border: 5px solid #e0e0e0;
            border-radius: var(--border-radius);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .answer-card:hover { transform: scale(1.05); border-color: var(--primary-color); }
        .answer-card.correct { border-color: var(--secondary-color); background: #eafff5; animation: pulse 0.6s; }
        .answer-card.incorrect { border-color: var(--danger-color); background: #ffebee; animation: shake 0.5s; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }

        .btn {
            padding: 1.2rem 2.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .btn-start { background: var(--secondary-color); }
        .btn-start:disabled { background: #999; cursor: wait; }

        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        .confetti { position: absolute; top: -10%; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="bg-elements"></div>

    <div class="container">
        <header>🚀 EduQuiz Fun Play! 🚀</header>
        <main>
            <div id="start-screen" style="text-align: center; padding: 3rem;">
                <h1 style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;">Siap Menjelajah?</h1>
                <p style="font-size: 1.3rem; margin-bottom: 2.5rem;">Ayo kumpulkan bintang dan jadi juara!</p>
                <button id="start-btn" class="btn btn-start" disabled>MEMUAT DATA...</button>
            </div>

            <div id="game-screen" style="display: none;">
                <div class="status-header">
                    <h2 id="q-counter" style="font-size: 1.5rem;">Soal 1 / 5</h2>
                    <div class="score-box">⭐ <span id="score-text">0</span></div>
                </div>
                <div class="progress-container"><div class="progress-fill" id="progress-bar"></div></div>
                
                <div class="question-box" id="question-box"></div>
                <div class="answers-grid" id="answers-grid"></div>
            </div>

            <div id="result-screen" style="display: none; text-align: center; padding: 2rem;">
                <h1 style="font-size: 4rem;">🏆</h1>
                <h2 style="font-size: 2.5rem; color: var(--primary-color); margin: 1rem 0;">Misi Selesai!</h2>
                <p style="font-size: 2rem;">Skor Akhir: <span id="final-score">0</span></p>
                <button class="btn btn-start" onclick="location.reload()" style="margin-top: 2rem;">🚀 Main Lagi</button>
            </div>
        </main>
    </div>

    <div id="confetti-container" class="confetti-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- PASTE FIREBASE CONFIG KAMU DI SINI ---
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "eduquiz-ac27a.firebaseapp.com",
            databaseURL: "https://eduquiz-ac27a-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "eduquiz-ac27a",
            storageBucket: "eduquiz-ac27a.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let questions = [];
        let currentIdx = 0;
        let score = 0;

        const ding = new Audio('https://www.myinstants.com/media/sounds/ding-sound-effect.mp3');
        const wrong = new Audio('https://www.myinstants.com/media/sounds/wrong-answer-2.mp3');

        // Init Background
        const bg = document.getElementById('bg-elements');
        for(let i=0; i<30; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.innerText = '⭐';
            s.style.left = Math.random()*100 + '%';
            s.style.top = Math.random()*100 + '%';
            s.style.fontSize = (Math.random()*1 + 0.5) + 'rem';
            s.style.animationDelay = Math.random()*3 + 's';
            bg.appendChild(s);
        }
        const rocket = document.createElement('div');
        rocket.className = 'rocket'; rocket.innerText = '🚀';
        bg.appendChild(rocket);

        // Load Data
        async function load() {
            const snap = await get(ref(db, 'questions'));
            if(snap.exists()) {
                questions = Object.values(snap.val());
                const btn = document.getElementById('start-btn');
                btn.innerText = "▶️ MULAI GAME";
                btn.disabled = false;
            } else {
                alert("Database kosong! Isi soal dulu.");
            }
        }
        load();

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            showQ();
        };

        function showQ() {
            if(currentIdx >= questions.length) return showResult();
            const q = questions[currentIdx];
            
            document.getElementById('q-counter').innerText = `Soal ${currentIdx + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${(currentIdx/questions.length)*100}%`;
            document.getElementById('score-text').innerText = score;

            const qBox = document.getElementById('question-box');
            qBox.innerHTML = `<h2 class="question-text">${q.qData.text}</h2>`;
            if(q.qData.useImg) qBox.innerHTML += `<img src="${q.qData.img}" class="question-img">`;
            if(q.qData.useAud) qBox.innerHTML += `<div><audio src="${q.qData.aud}" controls autoplay></audio></div>`;

            const grid = document.getElementById('answers-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${q.answers.length > 2 ? 2 : 1}, 1fr)`;

            q.answers.forEach((ans, i) => {
                const card = document.createElement('div');
                card.className = 'answer-card';
                card.innerHTML = `
                    <div style="position:absolute; top:10px; left:10px; background:#333; color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;">${String.fromCharCode(65+i)}</div>
                    ${ans.useImg ? `<img src="${ans.img}" style="width:100%; height:140px; object-fit:cover; border-radius:10px; margin-bottom:10px;">` : ''}
                    <p style="font-size:1.5rem; font-weight:600;">${ans.text}</p>
                    ${ans.useAud ? `<button onclick="event.stopPropagation(); new Audio('${ans.aud}').play()" style="margin-top:10px; border:none; background:var(--primary-color); color:white; padding:5px 15px; border-radius:20px; cursor:pointer;">🔊 Dengar</button>` : ''}
                `;
                card.onclick = () => check(i, card);
                grid.appendChild(card);
            });
        }

        function check(idx, el) {
            const q = questions[currentIdx];
            document.querySelectorAll('.answer-card').forEach(c => c.style.pointerEvents = 'none');
            
            if(q.answers[idx].isCorrect) {
                el.classList.add('correct'); score++; ding.play();
            } else {
                el.classList.add('incorrect'); wrong.play();
                const correctIdx = q.answers.findIndex(a => a.isCorrect);
                document.querySelectorAll('.answer-card')[correctIdx].classList.add('correct');
            }

            setTimeout(() => { currentIdx++; showQ(); }, 2500);
        }

        function showResult() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
            if(score === questions.length) launchConfetti();
        }

        function launchConfetti() {
            const cont = document.getElementById('confetti-container');
            const emj = ['🎉', '✨', '🌟', '🏆', '🌈'];
            for(let i=0; i<60; i++){
                const c = document.createElement('div');
                c.className = 'confetti';
                c.innerText = emj[Math.floor(Math.random()*emj.length)];
                c.style.left = Math.random()*100 + '%';
                c.style.fontSize = (Math.random()*2 + 1) + 'rem';
                c.style.animationDuration = (Math.random()*3 + 2) + 's';
                cont.appendChild(c);
            }
        }
    </script>
</body>
</html>
