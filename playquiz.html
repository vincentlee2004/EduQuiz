<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduQuiz - Play</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0D6EFD; --secondary-color: #198754; --accent-color: #FFC107;
            --danger-color: #DC3545; --dark-color: #212529; --light-color: #F8F9FA;
            --white: #ffffff; --shadow: 0 8px 25px rgba(0, 0, 0, 0.15); --border-radius: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Fredoka', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--dark-color); }
        .container { width: 95%; max-width: 1200px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: var(--border-radius); box-shadow: var(--shadow); overflow: hidden; border: 3px solid var(--white); }
        header { background: linear-gradient(90deg, var(--primary-color), var(--accent-color)); color: var(--white); padding: 1.5rem; text-align: center; font-size: 2.5rem; font-weight: 700; }
        main { padding: 2rem; min-height: 500px; position: relative; }
        
        /* Styles untuk Overlay Start */
        .start-overlay {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; min-height: 400px; text-align: center;
        }
        .start-overlay h3 { font-size: 2.5rem; color: var(--primary-color); margin-bottom: 1rem; }
        .start-overlay p { font-size: 1.2rem; margin-bottom: 2rem; color: #555; }

        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .game-header h2 { color: var(--dark-color); font-size: 1.5rem; }
        .score-display { font-size: 1.8rem; font-weight: 700; color: var(--primary-color); display: flex; align-items: center; gap: 0.5rem; }
        .score-display.score-pop { animation: scorePop 0.5s ease-out; }
        @keyframes scorePop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .progress-bar-container { width: 100%; height: 25px; background-color: var(--light-color); border-radius: 50px; overflow: hidden; margin-bottom: 2rem; border: 2px solid #ddd; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--secondary-color), var(--accent-color)); width: 0%; transition: width 0.5s ease-in-out; border-radius: 50px; }
        .question-container { text-align: center; margin-bottom: 2rem; }
        .audio-player { margin: 1rem auto; width: 100%; max-width: 500px; }
        .audio-player audio { width: 100%; border-radius: 10px; }
        .answers-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 2rem; }
        .answer-card { aspect-ratio: 1 / 1; border-radius: var(--border-radius); overflow: hidden; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; border: 5px solid transparent; position: relative; background: #fff; }
        .answer-card:hover:not(.correct):not(.incorrect) { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .answer-card img { width: 100%; height: 100%; object-fit: cover; }
        .answer-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; font-size: 2rem; font-weight: bold; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; border-radius: 50%; }
        .answer-card.correct { border-color: var(--secondary-color); animation: pulse 0.6s; }
        .answer-card.incorrect { border-color: var(--danger-color); animation: shake 0.5s; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(25, 135, 84, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(25, 135, 84, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(25, 135, 84, 0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); } 20%, 40%, 60%, 80% { transform: translateX(10px); } }
        .results-container { text-align: center; padding: 3rem; }
        .results-container h2 { font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem; }
        .final-score { font-size: 2.5rem; margin-bottom: 2rem; }
        .btn { padding: 1.2rem 2.5rem; font-size: 1.5rem; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s; color: var(--white); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-play { background: linear-gradient(45deg, var(--secondary-color), #20c997); }
        .btn-play:hover { transform: scale(1.1); }
        .btn-restart { background: linear-gradient(45deg, var(--primary-color), var(--accent-color)); }
        .btn-restart:hover { transform: scale(1.1); }
        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 9999; }
        .confetti { position: absolute; top: -10%; animation: confetti-fall 3s linear forwards; }
        @keyframes confetti-fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>🎮 EduQuiz - Let's Play! 🎮</header>
        <main>
            <div id="start-overlay" class="start-overlay">
                <h3>Ready for the Challenge?</h3>
                <p>Click the button below to start the audio quiz!</p>
                <button class="btn btn-play" onclick="initGame()">▶️ START GAME</button>
            </div>

            <div id="game-interface" style="display: none;">
                <div class="game-header">
                    <h2 id="question-counter">Question 1 of 5</h2>
                    <div class="score-display" id="score-display">
                        <span>⭐</span> <span id="score">0</span>
                    </div>
                </div>

                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>

                <div id="quiz-container">
                    <div class="question-container">
                        <p>🎧 Listen to the audio and choose the correct image!</p>
                        <div class="audio-player">
                            <audio id="audio-player" controls></audio>
                        </div>
                    </div>
                    <div id="answers-grid" class="answers-grid">
                        </div>
                </div>
            </div>
            
            <div id="results-container" class="results-container" style="display: none;">
                <h2>🎉 Quiz Finished! 🎉</h2>
                <p class="final-score">Your Final Score: <span id="final-score">0</span></p>
                <div style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
                    <button class="btn btn-restart" onclick="location.reload()">🚀 Play Again</button>
                    <button class="btn btn-restart" onclick="window.location.href='index.html'" style="background: #6c757d; font-size: 1.2rem;">🏠 Back to Home</button>
                </div>
            </div>
        </main>
    </div>

    <div id="confetti-container" class="confetti-container"></div>

    <script>
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        const correctSound = new Audio('https://www.myinstants.com/media/sounds/ding-sound-effect.mp3');
        const incorrectSound = new Audio('https://www.myinstants.com/media/sounds/wrong-answer-2.mp3');

        // Elemen HTML
        const startOverlay = document.getElementById('start-overlay');
        const gameInterface = document.getElementById('game-interface');
        const audioPlayer = document.getElementById('audio-player');
        const answersGrid = document.getElementById('answers-grid');
        const questionCounter = document.getElementById('question-counter');
        const scoreDisplay = document.getElementById('score-display');
        const scoreSpan = document.getElementById('score');
        const progressBar = document.getElementById('progress-bar');
        const quizContainer = document.getElementById('quiz-container');
        const resultsContainer = document.getElementById('results-container');
        const finalScoreDisplay = document.getElementById('final-score');
        const confettiContainer = document.getElementById('confetti-container');

        // Saat halaman dimuat, hanya load pertanyaan, jangan langsung main
        document.addEventListener('DOMContentLoaded', () => {
            loadQuestions();
        });

        function loadQuestions() {
        // AMBIL DARI LOCALSTORAGE
        questions = JSON.parse(localStorage.getItem('eduQuizQuestions') || '[]');
        
        if (questions.length === 0) {
            alert("No questions found! Redirecting...");
            window.location.href = 'index.html';
        }
    }

        // Fungsi dipanggil saat tombol START GAME diklik
        function initGame() {
            startOverlay.style.display = 'none'; // Sembunyikan tombol start
            gameInterface.style.display = 'block'; // Munculkan game
            startGame();
        }

        function startGame() {
            currentQuestionIndex = 0;
            score = 0;
            scoreSpan.textContent = score;
            progressBar.style.width = '0%';
            quizContainer.style.display = 'block';
            resultsContainer.style.display = 'none';
            confettiContainer.innerHTML = '';
            displayQuestion();
        }

        function displayQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showResults();
                return;
            }
            const question = questions[currentQuestionIndex];
            questionCounter.textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;
            
            // Set Audio Source
            audioPlayer.src = question.audio;
            audioPlayer.load();
            
            // Coba putar audio secara otomatis dengan penanganan error (Safe Play)
            const playPromise = audioPlayer.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Autoplay dicegah oleh browser. User perlu klik play manual.");
                    // Tidak perlu alert, user tinggal klik tombol play di audio control
                });
            }

            // Render Jawaban
            answersGrid.innerHTML = '';
            answersGrid.style.gridTemplateColumns = `repeat(${question.answers.length > 2 ? 2 : question.answers.length}, 1fr)`;

            question.answers.forEach((answer, index) => {
                const card = document.createElement('div');
                card.className = 'answer-card';
                card.dataset.index = index;
                card.innerHTML = `
                    <img src="${answer.image}" alt="Option ${index}">
                    <div class="answer-label">${String.fromCharCode(65 + index)}</div>
                `;
                card.addEventListener('click', () => checkAnswer(index));
                answersGrid.appendChild(card);
            });
        }

        function checkAnswer(selectedIndex) {
            const question = questions[currentQuestionIndex];
            const correctIndex = question.answers.findIndex(ans => ans.isCorrect);
            const cards = document.querySelectorAll('.answer-card');
            
            // Matikan klik setelah menjawab
            cards.forEach(card => card.style.pointerEvents = 'none');

            // Pause audio saat menjawab
            audioPlayer.pause();

            if (selectedIndex === correctIndex) {
                score++;
                scoreSpan.textContent = score;
                scoreDisplay.classList.remove('score-pop');
                void scoreDisplay.offsetWidth; // Trigger reflow animasi
                scoreDisplay.classList.add('score-pop');
                cards[selectedIndex].classList.add('correct');
                correctSound.play();
            } else {
                cards[selectedIndex].classList.add('incorrect');
                cards[correctIndex].classList.add('correct'); // Tunjukkan yang benar
                incorrectSound.play();
            }

            setTimeout(() => {
                currentQuestionIndex++;
                displayQuestion();
            }, 2000);
        }

        function showResults() {
            gameInterface.style.display = 'none'; // Sembunyikan area game
            resultsContainer.style.display = 'block'; // Munculkan hasil
            finalScoreDisplay.textContent = `${score} / ${questions.length}`;
            launchConfetti();
        }

        function launchConfetti() {
            const emojis = ['🎉', '🎊', '🌟', '✨', '🏆', '🎈'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    confetti.style.left = `${Math.random() * 100}%`;
                    confetti.style.animationDuration = `${Math.random() * 3 + 2}s`;
                    confetti.style.fontSize = `${Math.random() * 2 + 1}rem`;
                    confettiContainer.appendChild(confetti);
                }, i * 30);
            }
        }
    </script>
</body>
</html>
```
