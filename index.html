<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduQuiz - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0D6EFD;
            --secondary-color: #198754;
            --accent-color: #FFC107;
            --danger-color: #DC3545;
            --dark-color: #212529;
            --light-color: #F8F9FA;
            --white: #ffffff;
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            --border-radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--dark-color);
            overflow: hidden;
        }

        /* Animated Background Elements */
        #bg-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .star { position: absolute; color: white; animation: twinkle 3s infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 3px solid var(--white);
            z-index: 10;
        }

        header {
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            color: var(--white);
            padding: 2.5rem;
            text-align: center;
            font-size: 3rem;
            font-weight: 700;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            animation: wobble 7s ease-in-out infinite;
        }
        @keyframes wobble { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }

        main { padding: 3rem; text-align: center; }

        .home-buttons {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            padding: 1.5rem 3rem;
            font-size: 1.8rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 0 auto;
            width: 80%;
            max-width: 400px;
            font-family: 'Fredoka', sans-serif;
            text-decoration: none;
        }
        .btn:disabled {
            background: #ccc !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
        }
        .btn-play { background: linear-gradient(45deg, var(--secondary-color), #20c997); }
        .btn-play:not(:disabled):hover { transform: scale(1.1) rotate(3deg); }
        .btn-settings { background: linear-gradient(45deg, var(--accent-color), #fd7e14); }
        .btn-settings:hover { transform: scale(1.1) rotate(-3deg); }

        .home-status {
            margin-top: 2rem;
            font-size: 1.3rem;
            font-weight: 500;
            min-height: 30px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="bg-elements"></div>

    <div class="container">
        <header>🚀 EduQuiz Fun Game 🚀</header>
        <main>
            <div class="home-buttons">
                <button id="play-quiz-btn" class="btn btn-play" onclick="location.href='playquiz.html'" disabled>
                    <span>🏁</span> Play Quiz
                </button>
                <button class="btn btn-settings" onclick="location.href='quizsettings.html'">
                    <span>⚙️</span> Quiz Settings
                </button>
            </div>
            <p id="home-status" class="home-status">🔄 Menghubungkan ke Cloud...</p>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- PASTE KONFIGURASI FIREBASE KAMU DI SINI ---
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "eduquiz-ac27a.firebaseapp.com",
            databaseURL: "https://eduquiz-ac27a-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "eduquiz-ac27a",
            storageBucket: "eduquiz-ac27a.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const playBtn = document.getElementById('play-quiz-btn');
        const statusText = document.getElementById('home-status');

        // Fungsi Sync Otomatis dengan Firebase
        function syncCloudData() {
            const qRef = ref(db, 'questions');

            onValue(qRef, (snapshot) => {
                const data = snapshot.val();
                
                if (!data) {
                    playBtn.disabled = true;
                    statusText.textContent = "⚠️ Cloud Kosong. Silakan buat soal di Settings.";
                    statusText.style.color = "#DC3545"; // Merah
                } else {
                    // Hitung jumlah soal dari Cloud
                    const count = Object.keys(data).length;
                    playBtn.disabled = false;
                    statusText.textContent = `✅ Siap! Ada ${count} soal di Cloud tersedia.`;
                    statusText.style.color = "#198754"; // Hijau
                }
            }, (error) => {
                statusText.textContent = "❌ Error: Gagal koneksi ke Firebase.";
                console.error(error);
            });
        }

        // Jalankan sinkronisasi
        syncCloudData();

        // Tambah animasi bintang
        const bg = document.getElementById('bg-elements');
        for(let i=0; i<20; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerText = '⭐';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            bg.appendChild(star);
        }
    </script>
</body>
</html>
